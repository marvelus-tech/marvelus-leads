<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Leads • Marvelus</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=SF+Pro+Display:wght@400;500;600&display=swap');

    :root {
      --brand-primary: #0A66C2;
      --brand-success: #00A36B;
      --bg: #FAFAFC;
      --card: #FFFFFF;
      --text-primary: #111113;
      --text-secondary: #5F5F65;
      --line: #E8E8ED;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--bg);
      color: var(--text-primary);
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    .title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.8px;
      line-height: 1.05;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      transition: transform 0.08s cubic-bezier(0.4, 0.0, 0.2, 1);
    }

    .card:active {
      transform: scale(0.985);
    }

    .name {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .meta {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .metric {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.4px;
    }

    .label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .pill {
      font-size: 11px;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 9999px;
      background: #F1F5F9;
      color: var(--text-primary);
    }

    .seg {
      display: inline-flex;
      background: #E5E5EA;
      border-radius: 9999px;
      padding: 2px;
    }

    .seg-btn {
      padding: 5px 11px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 9999px;
    }

    .seg-btn.active {
      background: white;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 6px 8px;
    }

    .control {
      font-size: 13px;
      font-weight: 500;
    }

    .inline-action {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 6px;
      background: #F8FAFC;
      color: var(--brand-primary);
      font-weight: 600;
    }

    .modal {
      animation: modalEnter 0.16s cubic-bezier(0.32, 0.72, 0, 1);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="flex items-center justify-between mb-4">
      <div>
        <div class="title tracking-[-0.7px]">Leads</div>
        <div class="text-[#5F5F65] text-xs mt-0.5">Marvelus • Top 40 high-potential (of 110)</div>
      </div>
      <div class="flex items-center gap-2">
        <div class="px-2.5 py-1 bg-white border border-[#E8E8ED] rounded-3xl text-xs font-medium flex items-center gap-1.5">
          <div class="w-1.5 h-1.5 bg-[#00A36B] rounded-full"></div>
          <span>Live</span>
        </div>
        <button onclick="refresh()" class="w-8 h-8 flex items-center justify-center bg-white border border-[#E8E8ED] rounded-2xl active:bg-[#F8FAFC]">
          <i class="fa-solid fa-sync text-[#5F5F65] text-xs"></i>
        </button>
      </div>
    </div>

    <!-- Controls -->
    <div class="mb-4">
      <div class="flex gap-2 mb-3">
        <div class="seg">
          <div onclick="setSeg(this,'all')" class="seg-btn active cursor-pointer px-3 py-1 text-xs" data-seg="all">All</div>
          <div onclick="setSeg(this,'high')" class="seg-btn cursor-pointer px-3 py-1 text-xs" data-seg="high">High</div>
          <div onclick="setSeg(this,'multi')" class="seg-btn cursor-pointer px-3 py-1 text-xs" data-seg="multi">Multi</div>
        </div>
        <div class="flex-1"></div>
        <div class="seg">
          <div onclick="setDensity(this,'comfort')" class="seg-btn active cursor-pointer px-3 py-1 text-xs" data-density="comfort">Comfort</div>
          <div onclick="setDensity(this,'compact')" class="seg-btn cursor-pointer px-3 py-1 text-xs" data-density="compact">Compact</div>
        </div>
      </div>

      <div class="flex gap-2">
        <div class="flex-1 relative">
          <i class="fa-solid fa-search absolute left-3 top-2.5 text-[#5F5F65] text-xs"></i>
          <input id="search" onkeyup="filter()" placeholder="Search name or category" 
                 class="w-full bg-white border border-[#E8E8ED] rounded-3xl pl-8 pr-3 py-2 text-sm placeholder:text-[#5F5F65] focus:outline-none">
        </div>
        <button onclick="cycleSort()" class="control px-3 py-2 bg-white border border-[#E8E8ED] rounded-3xl flex items-center gap-1 text-xs font-medium">
          <span id="sort-label">Help</span>
          <i class="fa-solid fa-sort text-xs"></i>
        </button>
      </div>
    </div>

    <!-- Quick saved views -->
    <div class="flex gap-1.5 mb-3 overflow-x-auto pb-1">
      <div onclick="quickFilter('high-multi')" class="text-xs px-2.5 py-1 bg-white border border-[#E8E8ED] rounded-2xl whitespace-nowrap cursor-pointer active:bg-[#F8FAFC]">High + Multi</div>
      <div onclick="quickFilter('top-seo')" class="text-xs px-2.5 py-1 bg-white border border-[#E8E8ED] rounded-2xl whitespace-nowrap cursor-pointer active:bg-[#F8FAFC]">Top SEO</div>
      <div onclick="quickFilter('law')" class="text-xs px-2.5 py-1 bg-white border border-[#E8E8ED] rounded-2xl whitespace-nowrap cursor-pointer active:bg-[#F8FAFC]">Law firms</div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-4 gap-2 mb-4">
      <div class="stat">
        <div class="label">Shown</div>
        <div id="stat-total" class="metric">40</div>
      </div>
      <div class="stat">
        <div class="label">High</div>
        <div id="stat-high" class="metric text-[#0A66C2]">35</div>
      </div>
      <div class="stat">
        <div class="label">Avg Help</div>
        <div id="stat-avg" class="metric">98</div>
      </div>
      <div class="stat">
        <div class="label">Multi</div>
        <div id="stat-multi" class="metric">2</div>
      </div>
    </div>

    <!-- Grid -->
    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2.5">
      <!-- JS -->
    </div>

    <div class="mt-5 text-center text-[10px] text-[#5F5F65]">
      Top 40 of 110 • Inline actions available
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" onclick="if (event.target.id==='modal') closeModal()" class="hidden fixed inset-0 bg-black/50 flex items-end sm:items-center justify-center z-50">
    <div onclick="event.stopImmediatePropagation()" class="bg-white w-full sm:w-[420px] sm:rounded-3xl sm:m-4 rounded-t-3xl modal">
      <div class="p-5 border-b flex justify-between">
        <div>
          <div id="m-name" class="font-semibold text-lg"></div>
          <div id="m-meta" class="text-xs text-[#5F5F65]"></div>
        </div>
        <button onclick="closeModal()" class="text-2xl text-[#5F5F65]">×</button>
      </div>
      <div class="p-5 space-y-4">
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-[#F8FAFC] rounded-xl p-3">
            <div class="label">SEO</div>
            <div id="m-seo" class="text-4xl font-semibold"></div>
          </div>
          <div class="bg-[#F8FAFC] rounded-xl p-3">
            <div class="label">HELP</div>
            <div id="m-help" class="text-4xl font-semibold"></div>
          </div>
        </div>

        <div>
          <div class="label mb-1">RECOMMENDED</div>
          <div id="m-rec" class="inline px-3 py-0.5 text-sm font-semibold bg-[#111113] text-white rounded-2xl"></div>
        </div>

        <div>
          <div class="label mb-1">CONTACT</div>
          <div id="m-contact" class="text-sm space-y-0.5"></div>
        </div>

        <div>
          <div class="label mb-1">OUTREACH</div>
          <div class="border border-[#E8E8ED] rounded-xl p-3">
            <div class="flex justify-between mb-1">
              <div class="text-sm font-semibold flex items-center gap-1.5"><i class="fa-solid fa-comment-dots text-[#0A66C2]"></i> SMS</div>
              <button onclick="copySMS()" class="text-xs px-2 py-0.5 bg-white border rounded-lg">Copy</button>
            </div>
            <div id="m-sms" class="text-sm"></div>
          </div>
          <div class="mt-2 flex items-center gap-2">
            <div class="text-sm font-semibold">Email</div>
            <button onclick="toggleEmail(this)" class="w-7 h-7 flex items-center justify-center text-[#0A66C2] hover:bg-[#F0F7FF] rounded-full"><i class="fa-solid fa-envelope"></i></button>
          </div>
          <div id="email-pop" class="hidden mt-1 border border-[#E8E8ED] rounded-xl p-3 bg-[#F8FAFC] text-sm">
            <div class="flex justify-between">
              <div class="font-medium text-xs">SUBJECT</div>
              <button onclick="copyEmail()" class="text-xs px-1.5 bg-white border rounded">Copy</button>
            </div>
            <div id="m-subj" class="font-medium mb-2"></div>
            <div class="font-medium text-xs">BODY</div>
            <div id="m-body" class="whitespace-pre-line"></div>
          </div>
        </div>
      </div>
      <div class="p-4 border-t bg-[#FAFAFC] flex gap-2">
        <button onclick="openWeb()" class="flex-1 py-2.5 bg-white border rounded-2xl text-sm font-semibold">Website</button>
        <button onclick="copyEmail()" class="flex-1 py-2.5 bg-white border rounded-2xl text-sm font-semibold">Email</button>
      </div>
    </div>
  </div>

  <script>
    let leads = [{"id":1,"name":"Weinberg Lawyers","category":"law firm","location":"Melbourne, VIC","website":"https://www.weinberglawyers.com.au/","seo":0,"overall":130,"recommended":"AI Voice","priority":"high","multi":false,"phone":"+61421966943","email":"david@weinberglawyers.com.au","sms":"Hi Weinberg, natural AI receptionist for law firms in Melbourne that books 24/7. 10-min chat?","email_subject":"AI receptionist for Weinberg Lawyers","email_body":"Hi team,\n\nI help law firms in Melbourne stop missing calls with a natural AI receptionist.\n\nOpen to a quick call?\n\nMarvelus"}];

    let seg = 'all', search = '', sort = 'overall', density = 'comfort';

    function updateStats(f) {
      document.getElementById('stat-total').textContent = f.length;
      document.getElementById('stat-high').textContent = f.filter(l => l.priority === 'high').length;
      const avg = f.length ? Math.round(f.reduce((s,l) => s + l.overall, 0) / f.length) : 0;
      document.getElementById('stat-avg').textContent = avg || '—';
      document.getElementById('stat-multi').textContent = f.filter(l => l.multi).length;
    }

    function render(f) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      const compact = density === 'compact';

      f.forEach(lead => {
        const el = document.createElement('div');
        el.className = `card p-4 cursor-pointer ${compact ? 'p-3' : ''}`;
        el.innerHTML = `
          <div class="flex justify-between mb-2">
            <div class="min-w-0">
              <div class="name truncate">${lead.name}</div>
              <div class="meta">${lead.category} • ${lead.location}</div>
            </div>
            <div class="pill">${lead.recommended}</div>
          </div>
          <div class="flex gap-4 mb-3">
            <div><div class="metric">${lead.seo}</div><div class="label">SEO</div></div>
            <div><div class="metric">${lead.overall}</div><div class="label">HELP</div></div>
          </div>
          <div class="flex items-center justify-between pt-2 border-t border-[#F2F2F7]">
            <div class="flex gap-1">
              <span class="px-1.5 py-px text-[9px] font-semibold rounded ${lead.priority==='high' ? 'bg-[#ff3b30] text-white' : 'bg-[#8e8e93] text-white'}">${lead.priority.toUpperCase()}</span>
              ${lead.multi ? '<span class="px-1.5 py-px text-[9px] font-semibold bg-[#0A66C2] text-white rounded">MULTI</span>' : ''}
            </div>
            <div class="flex gap-1">
              <button onclick="event.stopImmediatePropagation(); copySMSInline(${lead.id})" class="inline-action">Copy SMS</button>
              <button onclick="event.stopImmediatePropagation(); window.open('${lead.website}','_blank')" class="inline-action"><i class="fa-solid fa-external-link-alt"></i></button>
            </div>
          </div>
        `;
        el.onclick = () => showModal(lead);
        grid.appendChild(el);
      });
    }

    function filter() {
      let f = leads;
      const q = document.getElementById('search').value.toLowerCase().trim();
      if (q) f = f.filter(l => l.name.toLowerCase().includes(q) || l.category.toLowerCase().includes(q));
      if (seg === 'high') f = f.filter(l => l.priority === 'high');
      if (seg === 'multi') f = f.filter(l => l.multi);
      if (seg === 'ai') f = f.filter(l => l.recommended.toLowerCase().includes('voice'));

      if (sort === 'overall') f.sort((a,b) => b.overall - a.overall);
      if (sort === 'seo') f.sort((a,b) => b.seo - a.seo);
      if (sort === 'name') f.sort((a,b) => a.name.localeCompare(b.name));

      render(f);
      updateStats(f);
    }

    function setSeg(el, s) {
      document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      seg = s;
      filter();
    }

    function setDensity(el, d) {
      document.querySelectorAll('[data-density]').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      density = d;
      const g = document.getElementById('grid');
      g.classList.toggle('density-compact', d === 'compact');
      filter();
    }

    function cycleSort() {
      const opts = ['overall','seo','name'];
      let i = opts.indexOf(sort);
      sort = opts[(i+1)%opts.length];
      document.getElementById('sort-label').textContent = sort === 'overall' ? 'Help' : sort === 'seo' ? 'SEO' : 'Name';
      filter();
    }

    function quickFilter(type) {
      document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
      if (type === 'high-multi') {
        seg = 'multi';
        document.querySelector('[data-seg="multi"]').classList.add('active');
      } else if (type === 'top-seo') {
        sort = 'seo';
        document.getElementById('sort-label').textContent = 'SEO';
      } else if (type === 'law') {
        document.getElementById('search').value = 'law';
      }
      filter();
    }

    function showModal(lead) {
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
      document.getElementById('m-name').textContent = lead.name;
      document.getElementById('m-meta').textContent = `${lead.category} • ${lead.location}`;
      document.getElementById('m-seo').textContent = lead.seo;
      document.getElementById('m-help').textContent = lead.overall;
      document.getElementById('m-rec').textContent = lead.recommended;
      document.getElementById('m-contact').innerHTML = `
        ${lead.phone ? `<div><i class="fa-solid fa-phone mr-1.5 text-[#5F5F65]"></i>${lead.phone}</div>` : ''}
        ${lead.email ? `<div><i class="fa-solid fa-envelope mr-1.5 text-[#5F5F65]"></i>${lead.email}</div>` : ''}
      `;
      document.getElementById('m-sms').textContent = lead.sms || 'No draft';
      const pop = document.getElementById('email-pop');
      pop.classList.add('hidden');
      pop.dataset.subj = lead.email_subject || '';
      pop.dataset.body = lead.email_body || '';
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('flex');
      document.getElementById('modal').classList.add('hidden');
    }

    function copySMSInline(id) {
      const l = leads.find(x => x.id === id);
      if (l && l.sms) navigator.clipboard.writeText(l.sms).then(() => alert('SMS copied'));
    }

    function copySMS() {
      const l = leads.find(x => x.id == document.getElementById('modal').dataset.currentId); // simplified
      if (l?.sms) navigator.clipboard.writeText(l.sms).then(() => alert('Copied'));
    }

    function toggleEmail(btn) {
      const pop = document.getElementById('email-pop');
      pop.classList.toggle('hidden');
      if (!pop.classList.contains('hidden')) {
        document.getElementById('m-subj').textContent = pop.dataset.subj;
        document.getElementById('m-body').textContent = pop.dataset.body;
      }
    }

    function copyEmail() {
      const pop = document.getElementById('email-pop');
      const txt = `Subject: ${pop.dataset.subj}\n\n${pop.dataset.body}`;
      navigator.clipboard.writeText(txt).then(() => { alert('Email copied'); pop.classList.add('hidden'); });
    }

    function openWeb() {
      const id = document.getElementById('modal').dataset.currentId;
      const l = leads.find(x => x.id == id);
      if (l) window.open(l.website, '_blank');
    }

    function filterLeads() { filter(); }
    function refresh() { location.reload(); }

    function init() {
      // leads already defined with real data
      const g = document.getElementById('grid');
      render(leads);
      updateStats(leads);
      document.getElementById('search').addEventListener('input', filter);
      console.log('%c[Phase 5] Apple Phase 5 with brand colors + inline actions', 'color:#5F5F65');
    }
    window.onload = init;
  </script>
</body>
</html>
