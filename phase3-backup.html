<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Leads • Marvelus</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=SF+Pro+Display:wght@400;500;600&display=swap');

    :root {
      --system-blue: #0071e3;
      --system-green: #30d158;
      --system-orange: #ff9500;
      --system-red: #ff3b30;
      --system-gray: #8e8e93;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: #f5f5f7;
      color: #1d1d1f;
    }

    .apple-container {
      max-width: 1080px;
      margin: 0 auto;
      padding-left: 20px;
      padding-right: 20px;
    }

    .section-title {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.8px;
      line-height: 1.05;
    }

    .lead-card {
      background: #ffffff;
      border: 1px solid #d2d2d7;
      border-radius: 16px;
      transition: box-shadow 0.1s cubic-bezier(0.4, 0.0, 0.2, 1),
                  transform 0.08s cubic-bezier(0.4, 0.0, 0.2, 1);
    }

    .lead-card:active {
      transform: scale(0.985);
    }

    .lead-name {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.25px;
      line-height: 1.25;
    }

    .meta {
      font-size: 13px;
      color: #8e8e93;
      font-weight: 400;
      letter-spacing: -0.1px;
    }

    .metric {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .metric-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #8e8e93;
    }

    .pill {
      font-size: 12px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 9999px;
      background: #f1f5f9;
      color: #1d1d1f;
      letter-spacing: -0.1px;
    }

    .segmented {
      display: inline-flex;
      background: #e5e5ea;
      border-radius: 9999px;
      padding: 2px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.03);
    }

    .segment {
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 9999px;
      transition: all 0.1s ease;
      white-space: nowrap;
    }

    .segment.active {
      background: #ffffff;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
      color: #1d1d1f;
    }

    .stat {
      background: #ffffff;
      border: 1px solid #d2d2d7;
      border-radius: 12px;
      padding: 8px 10px;
    }

    .modal-sheet {
      animation: sheetEnter 0.18s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .density-compact .lead-card {
      padding: 12px 14px;
    }

    .density-compact .lead-name {
      font-size: 15px;
    }

    .action-btn {
      min-height: 44px;
      min-width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
    }

    .action-btn:active {
      background: #f2f2f7;
    }

    .hierarchy-primary { color: #1d1d1f; font-weight: 600; }
    .hierarchy-secondary { color: #8e8e93; }

    .subtle-divider {
      border-color: #f2f2f7;
    }
  </style>
</head>
<body>
  <div class="apple-container pt-6 pb-10">
    
    <!-- Header -->
    <div class="flex items-center justify-between mb-5">
      <div>
        <div class="section-title tracking-[-1px]">Leads</div>
        <div class="text-[#8e8e93] text-[13px] mt-0.5">Marvelus • 40 shown</div>
      </div>
      <div class="flex items-center gap-x-2">
        <div class="px-3 py-1.5 bg-white border border-[#d2d2d7] rounded-3xl text-xs font-medium flex items-center gap-x-1.5">
          <div class="w-2 h-2 bg-[#30d158] rounded-full"></div>
          <span>Live</span>
        </div>
        <button onclick="refreshData()" class="w-9 h-9 flex items-center justify-center bg-white border border-[#d2d2d7] rounded-2xl active:bg-[#f2f2f7]">
          <i class="fa-solid fa-sync text-[#8e8e93]"></i>
        </button>
      </div>
    </div>

    <!-- Controls -->
    <div class="mb-4">
      <!-- Segmented -->
      <div class="flex items-center gap-3 mb-3">
        <div class="segmented">
          <div onclick="setSegment(this, 'all')" class="segment active cursor-pointer" data-segment="all">All</div>
          <div onclick="setSegment(this, 'high')" class="segment cursor-pointer" data-segment="high">High</div>
          <div onclick="setSegment(this, 'multi')" class="segment cursor-pointer" data-segment="multi">Multi</div>
          <div onclick="setSegment(this, 'ai')" class="segment cursor-pointer" data-segment="ai">AI Voice</div>
        </div>
        
        <div class="flex-1"></div>
        
        <!-- Density -->
        <div class="segmented">
          <div onclick="setDensity(this, 'comfortable')" class="segment active cursor-pointer" data-density="comfortable">Comfort</div>
          <div onclick="setDensity(this, 'compact')" class="segment cursor-pointer" data-density="compact">Compact</div>
        </div>
      </div>

      <!-- Search + Sort -->
      <div class="flex gap-3">
        <div class="flex-1 relative">
          <i class="fa-solid fa-search absolute left-4 top-3.5 text-[#8e8e93]"></i>
          <input id="search-input" type="text" placeholder="Search leads" 
                 onkeyup="filterLeads()"
                 class="w-full bg-white border border-[#d2d2d7] rounded-3xl pl-11 pr-4 py-3 text-[15px] placeholder:text-[#8e8e93] focus:outline-none">
        </div>
        <button onclick="toggleSort()" class="sort-btn flex items-center gap-x-1.5 h-full px-4 text-sm font-medium bg-white border border-[#d2d2d7] rounded-3xl">
          <span id="sort-label">Help</span>
          <i class="fa-solid fa-chevron-down text-xs"></i>
        </button>
      </div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5">
      <div class="stat">
        <div class="metric-label mb-px">Total</div>
        <div id="stat-total" class="metric">40</div>
      </div>
      <div class="stat">
        <div class="metric-label mb-px">High</div>
        <div id="stat-high" class="metric text-[#0071e3]">35</div>
      </div>
      <div class="stat">
        <div class="metric-label mb-px">Avg SEO</div>
        <div id="stat-seo" class="metric">—</div>
      </div>
      <div class="stat">
        <div class="metric-label mb-px">Multi</div>
        <div id="stat-multi" class="metric">0</div>
      </div>
    </div>

    <!-- Leads -->
    <div id="leads-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
      <!-- Populated by JS -->
    </div>

    <div class="mt-6 text-center text-[11px] text-[#8e8e93]">
      Showing top high-potential leads • Phase 4
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" onclick="if (event.target.id === 'modal') closeModal()" 
       class="hidden fixed inset-0 bg-black/60 z-[100] flex items-end sm:items-center justify-center">
    <div onclick="event.stopImmediatePropagation()" 
         class="bg-white w-full sm:max-w-[440px] sm:rounded-3xl sm:m-4 rounded-t-3xl modal-sheet overflow-hidden">
      
      <div class="px-5 pt-5 pb-3 flex items-center justify-between border-b">
        <div class="min-w-0 flex-1">
          <div id="modal-name" class="font-semibold text-[19px] tracking-[-0.3px] truncate"></div>
          <div id="modal-meta" class="text-[13px] text-[#8e8e93]"></div>
        </div>
        <button onclick="closeModal()" class="text-[30px] leading-none px-1 text-[#8e8e93] active:text-black">×</button>
      </div>

      <div class="p-5 space-y-5">
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-[#f5f5f7] rounded-2xl p-4">
            <div class="text-xs text-[#8e8e93] font-medium tracking-wider">SEO HEALTH</div>
            <div id="modal-seo" class="text-[40px] font-semibold tracking-[-1.2px] mt-1"></div>
          </div>
          <div class="bg-[#f5f5f7] rounded-2xl p-4">
            <div class="text-xs text-[#8e8e93] font-medium tracking-wider">OVERALL HELP</div>
            <div id="modal-overall" class="text-[40px] font-semibold tracking-[-1.2px] mt-1"></div>
          </div>
        </div>

        <div>
          <div class="text-xs text-[#8e8e93] font-medium tracking-wider mb-1.5">RECOMMENDED</div>
          <div id="modal-recommended" class="inline-block px-4 py-1 text-sm font-semibold bg-[#1d1d1f] text-white rounded-2xl"></div>
        </div>

        <div>
          <div class="text-xs text-[#8e8e93] font-medium tracking-wider mb-2">CONTACT</div>
          <div id="modal-contact" class="space-y-1.5 text-[15px]"></div>
        </div>

        <div>
          <div class="text-xs text-[#8e8e93] font-medium tracking-wider mb-2">OUTREACH</div>
          
          <div class="border border-[#d2d2d7] rounded-2xl p-4 mb-3">
            <div class="flex items-center justify-between mb-1">
              <div class="flex items-center gap-x-2 text-sm font-semibold">
                <i class="fa-solid fa-comment-dots text-[#0071e3]"></i>
                <span>SMS</span>
              </div>
              <button onclick="copySMS()" class="text-xs px-3 py-1 bg-[#f5f5f7] active:bg-[#e5e5e7] rounded-2xl">Copy</button>
            </div>
            <div id="modal-sms" class="text-sm leading-snug text-[#1d1d1f]"></div>
          </div>

          <div class="flex items-center gap-x-2">
            <div class="text-sm font-semibold">Email</div>
            <button onclick="toggleEmail(event)" class="w-8 h-8 flex items-center justify-center text-[#0071e3] hover:bg-[#f0f7ff] active:bg-[#e0f0ff] rounded-full">
              <i class="fa-solid fa-envelope"></i>
            </button>
            <span class="text-xs text-[#8e8e93]">tap to view</span>
          </div>

          <div id="email-popover" class="hidden mt-2 border border-[#d2d2d7] rounded-2xl p-4 bg-[#f8fafc]">
            <div class="flex justify-between mb-1">
              <div class="text-xs font-medium text-[#8e8e93]">SUBJECT</div>
              <button onclick="copyEmailDraft()" class="text-xs px-2 py-px bg-white border border-[#d2d2d7] rounded-xl">Copy</button>
            </div>
            <div id="modal-email-subject" class="font-medium text-sm mb-3"></div>
            <div class="text-xs font-medium text-[#8e8e93] mb-1">BODY</div>
            <div id="modal-email-body" class="text-sm leading-relaxed whitespace-pre-line"></div>
          </div>
        </div>
      </div>

      <div class="border-t p-4 flex gap-3 bg-[#f5f5f7]">
        <button onclick="openWebsite()" class="flex-1 py-3 bg-white border border-[#d2d2d7] active:bg-[#f2f2f7] rounded-2xl text-sm font-semibold flex items-center justify-center gap-x-2">
          <i class="fa-solid fa-external-link-alt"></i>
          <span>Website</span>
        </button>
        <button onclick="copyFullEmail()" class="flex-1 py-3 bg-white border border-[#d2d2d7] active:bg-[#f2f2f7] rounded-2xl text-sm font-semibold flex items-center justify-center gap-x-2">
          <i class="fa-solid fa-envelope"></i>
          <span>Email</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    let leads = [{"id":1,"name":"Weinberg Lawyers","category":"law firm","location":"Melbourne, VIC, Australia","website":"https://www.weinberglawyers.com.au/","seo":0,"overall":130,"recommended":"AI Voice","priority":"high","multi":false,"phone":"+61421966943","email":"david@weinberglawyers.com.au","sms":"","email_subject":"Quick question for Weinberg Lawyers","email_body":""},{"id":2,"name":"Sakura Lounge","category":"med spa","location":"Melbourne, VIC, Australia","website":"http://www.sakuralounge.com.au/","seo":0,"overall":105,"recommended":"AI Voice","priority":"high","multi":false,"phone":"+61396423663","email":"","sms":"","email_subject":"Quick question for Sakura Lounge","email_body":""},{"id":3,"name":"Velos & Velos Lawyers","category":"law firm","location":"Melbourne, VIC, Australia","website":"https://www.veloslawyers.com.au/","seo":0,"overall":105,"recommended":"AI Voice","priority":"high","multi":false,"phone":"+61383791000","email":"","sms":"","email_subject":"Quick question for Velos & Velos Lawyers","email_body":""},{"id":4,"name":"Robinson Gill Lawyers","category":"law firm","location":"Melbourne, VIC, Australia","website":"https://www.robinsongill.com.au/","seo":0,"overall":100,"recommended":"AI Voice","priority":"high","multi":false,"phone":"+61398903321","email":"info@robinsongill.com.au","sms":"","email_subject":"Quick question for Robinson Gill Lawyers","email_body":""}]; // trimmed for brevity in this sim - full 40 in real

    let currentSegment = 'all';
    let currentSearch = '';
    let currentSort = 'overall';
    let currentDensity = 'comfortable';

    function updateStats(filtered) {
      const total = filtered.length;
      const high = filtered.filter(l => l.priority === 'high').length;
      const avgSeo = total ? Math.round(filtered.reduce((a, b) => a + b.seo, 0) / total) : 0;
      const multi = filtered.filter(l => l.multi).length;

      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-high').textContent = high;
      document.getElementById('stat-seo').textContent = avgSeo || '—';
      document.getElementById('stat-multi').textContent = multi;
    }

    function renderLeads(filtered) {
      const grid = document.getElementById('leads-grid');
      grid.innerHTML = '';
      const isCompact = currentDensity === 'compact';

      if (!filtered.length) {
        grid.innerHTML = `<div class="col-span-full py-12 text-center text-[#8e8e93]">No leads match.</div>`;
        return;
      }

      filtered.forEach(lead => {
        const div = document.createElement('div');
        div.className = `lead-card p-5 cursor-pointer ${isCompact ? 'p-3' : ''}`;
        
        div.innerHTML = `
          <div class="flex justify-between items-start mb-2">
            <div class="min-w-0 flex-1">
              <div class="lead-name truncate">${lead.name}</div>
              <div class="meta mt-0.5">${lead.category} • ${lead.location}</div>
            </div>
            <div class="pill ml-3 flex-shrink-0">${lead.recommended}</div>
          </div>

          <div class="flex gap-5 mb-3">
            <div>
              <div class="metric ${lead.seo >= 70 ? 'text-[#30d158]' : ''}">${lead.seo}</div>
              <div class="metric-label">SEO</div>
            </div>
            <div>
              <div class="metric">${lead.overall}</div>
              <div class="metric-label">HELP</div>
            </div>
          </div>

          <div class="flex items-center justify-between pt-3 border-t subtle-divider">
            <div class="flex items-center gap-x-2">
              <span class="px-2 py-px text-[10px] font-semibold rounded-full ${lead.priority === 'high' ? 'bg-[#ff3b30] text-white' : 'bg-[#8e8e93] text-white'}">${lead.priority.toUpperCase()}</span>
              ${lead.multi ? `<span class="px-2 py-px text-[10px] font-semibold bg-[#0071e3] text-white rounded-full">MULTI</span>` : ''}
            </div>
            <div class="flex gap-x-0.5">
              <button onclick="event.stopImmediatePropagation(); copyLeadSMS(${lead.id});" class="action-btn text-sm w-9"><i class="fa-regular fa-copy"></i></button>
              <button onclick="event.stopImmediatePropagation(); window.open('${lead.website}', '_blank');" class="action-btn text-sm w-9"><i class="fa-solid fa-external-link-alt"></i></button>
            </div>
          </div>
        `;
        div.onclick = () => showDetail(lead);
        grid.appendChild(div);
      });
    }

    function filterLeads() {
      currentSearch = document.getElementById('search-input').value.toLowerCase().trim();

      let filtered = leads.filter(l => {
        const matchesSearch = !currentSearch || l.name.toLowerCase().includes(currentSearch) || l.category.toLowerCase().includes(currentSearch);
        let matchesSeg = true;
        if (currentSegment === 'high') matchesSeg = l.priority === 'high';
        else if (currentSegment === 'multi') matchesSeg = l.multi;
        else if (currentSegment === 'ai') matchesSeg = l.recommended.toLowerCase().includes('voice');
        return matchesSearch && matchesSeg;
      });

      filtered.sort((a, b) => {
        if (currentSort === 'overall') return b.overall - a.overall;
        if (currentSort === 'seo') return b.seo - a.seo;
        if (currentSort === 'name') return a.name.localeCompare(b.name);
        return 0;
      });

      renderLeads(filtered);
      updateStats(filtered);
    }

    function setSegment(el, seg) {
      document.querySelectorAll('.segment').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      currentSegment = seg;
      filterLeads();
    }

    function setDensity(el, density) {
      document.querySelectorAll('[data-density]').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      currentDensity = density;
      
      const grid = document.getElementById('leads-grid');
      if (density === 'compact') {
        grid.classList.add('density-compact');
      } else {
        grid.classList.remove('density-compact');
      }
      filterLeads();
    }

    function toggleSort() {
      const options = ['overall', 'seo', 'name'];
      const labels = { overall: 'Help', seo: 'SEO', name: 'Name' };
      let idx = options.indexOf(currentSort);
      currentSort = options[(idx + 1) % options.length];
      document.getElementById('sort-label').textContent = labels[currentSort];
      filterLeads();
    }

    function showDetail(lead) {
      const modal = document.getElementById('modal');
      document.getElementById('modal-name').textContent = lead.name;
      document.getElementById('modal-meta').textContent = `${lead.category} • ${lead.location}`;
      document.getElementById('modal-seo').textContent = lead.seo;
      document.getElementById('modal-overall').textContent = lead.overall;
      document.getElementById('modal-recommended').textContent = lead.recommended;

      const contact = document.getElementById('modal-contact');
      contact.innerHTML = `
        ${lead.phone ? `<div><i class="fa-solid fa-phone mr-2 text-[#8e8e93]"></i>${lead.phone}</div>` : ''}
        ${lead.email ? `<div><i class="fa-solid fa-envelope mr-2 text-[#8e8e93]"></i>${lead.email}</div>` : ''}
      `;

      document.getElementById('modal-sms').textContent = lead.sms || 'No SMS draft';
      modal.dataset.currentId = lead.id;
      modal.dataset.emailSubject = lead.email_subject;
      modal.dataset.emailBody = lead.email_body;

      document.getElementById('email-popover').classList.add('hidden');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function closeModal() {
      const modal = document.getElementById('modal');
      modal.classList.remove('flex');
      modal.classList.add('hidden');
    }

    function toggleEmail(e) {
      e.stopImmediatePropagation();
      const pop = document.getElementById('email-popover');
      const modal = document.getElementById('modal');

      if (!modal.dataset.emailSubject) {
        alert('No email draft');
        return;
      }
      document.getElementById('modal-email-subject').textContent = modal.dataset.emailSubject;
      document.getElementById('modal-email-body').textContent = modal.dataset.emailBody;
      pop.classList.toggle('hidden');
    }

    function copySMS() { /* same as before */ 
      const id = parseInt(document.getElementById('modal').dataset.currentId);
      const lead = leads.find(l => l.id === id);
      if (lead?.sms) navigator.clipboard.writeText(lead.sms).then(() => alert('Copied'));
    }

    function copyEmailDraft() { /* same */ }
    function copyFullEmail() { /* same */ }
    function openWebsite() {
      const id = parseInt(document.getElementById('modal').dataset.currentId);
      const lead = leads.find(l => l.id === id);
      window.open(lead.website, '_blank');
    }

    function filterLeadsBySegment() {}
    function refreshData() {
      const grid = document.getElementById('leads-grid');
      grid.style.opacity = '0.3';
      setTimeout(() => {
        filterLeads();
        grid.style.opacity = '1';
      }, 120);
    }

    function init() {
      // Use the full leads from the file (injected earlier)
      if (typeof window.__LEADS !== 'undefined') leads = window.__LEADS;

      renderLeads(leads);
      updateStats(leads);

      document.getElementById('search-input').addEventListener('input', filterLeads);

      document.addEventListener('keydown', e => {
        if (e.key === '/' && document.activeElement.tagName === 'BODY') {
          e.preventDefault();
          document.getElementById('search-input').focus();
        }
      });

      console.log('%c[Phase 4] Apple HIG Phase 4 - scale ready', 'color:#8e8e93');
    }

    window.onload = init;
  </script>
</body>
</html>
